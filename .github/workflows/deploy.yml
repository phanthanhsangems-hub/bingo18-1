name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/sync-draws.yml'
      - '.github/workflows/morning-digest.yml'
      - 'sync_to_supabase.py'
      - '.github/sync-requirements.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build Docker image
        run: |
          TAG=$(git rev-parse --short HEAD)
          IMAGE="asia-southeast1-docker.pkg.dev/bingo18-predictor/bingo18-images/bingo18:${TAG}"
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV
          gcloud builds submit \
            --tag "${IMAGE}" \
            --project bingo18-predictor \
            --timeout 900s

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy bingo18 \
            --image "$IMAGE" \
            --region asia-southeast1 \
            --project bingo18-predictor \
            --quiet
