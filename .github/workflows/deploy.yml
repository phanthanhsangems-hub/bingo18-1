name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/sync-draws.yml'
      - '.github/workflows/morning-digest.yml'
      - 'sync_to_supabase.py'
      - '.github/sync-requirements.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build Docker image
        run: |
          TAG=$(git rev-parse --short HEAD)
          IMAGE="asia-southeast1-docker.pkg.dev/bingo18-predictor/bingo18-images/bingo18:${TAG}"
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV
          # --async avoids the log-streaming permission error (SA doesn't need logs bucket access)
          BUILD_ID=$(gcloud builds submit \
            --tag "${IMAGE}" \
            --project bingo18-predictor \
            --timeout 900s \
            --async \
            --format='value(id)')
          echo "Cloud Build ID: ${BUILD_ID}"
          # Poll until done
          for i in $(seq 1 90); do
            STATUS=$(gcloud builds describe "${BUILD_ID}" \
              --project bingo18-predictor \
              --format='value(status)')
            echo "  [${i}/90] status=${STATUS}"
            if [ "${STATUS}" = "SUCCESS" ]; then
              echo "Build succeeded."
              break
            elif [ "${STATUS}" = "FAILURE" ] || [ "${STATUS}" = "CANCELLED" ] || [ "${STATUS}" = "TIMEOUT" ]; then
              echo "Build failed: ${STATUS}"
              exit 1
            fi
            sleep 10
          done
          if [ "${STATUS}" != "SUCCESS" ]; then
            echo "Build timed out waiting (status=${STATUS})"; exit 1
          fi

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy bingo18 \
            --image "$IMAGE" \
            --region asia-southeast1 \
            --project bingo18-predictor \
            --quiet
