name: Sync Bingo18 Draws

on:
  schedule:
    - cron: '*/6 * * * *'   # mỗi 6 phút (game ra kỳ mới mỗi 6 phút)
  workflow_dispatch:          # cho phép chạy tay từ GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 4        # kill nếu treo (tránh tốn minutes)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: .github/sync-requirements.txt

      - name: Install sync dependencies
        run: pip install -r .github/sync-requirements.txt

      - name: Sync draws → Cloud Run → Supabase
        env:
          CLOUD_RUN_URL:  https://bingo18-633959711537.asia-southeast1.run.app
          TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
        run: python sync_to_supabase.py --mode gha
