name: Morning Digest

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC = 07:00 Asia/Ho_Chi_Minh
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: .github/sync-requirements.txt

      - name: Install dependencies
        run: pip install -r .github/sync-requirements.txt

      - name: Send morning digest
        env:
          DB_HOST:            ${{ secrets.DB_HOST }}
          DB_PORT:            ${{ secrets.DB_PORT }}
          DB_NAME:            ${{ secrets.DB_NAME }}
          DB_USER:            ${{ secrets.DB_USER }}
          DB_PASSWORD:        ${{ secrets.DB_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python sync_to_supabase.py --mode morning_digest
