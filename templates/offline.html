<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offline · Bingo18</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #05070f;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,245,255,.012) 3px, rgba(0,245,255,.012) 4px),
      radial-gradient(ellipse at 50% 30%, rgba(0,245,255,.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(255,0,170,.05) 0%, transparent 50%);
    color: #d0e8f0;
    font-family: 'JetBrains Mono', monospace;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px; text-align: center;
    -webkit-font-smoothing: antialiased;
  }

  ::-webkit-scrollbar { width:3px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,245,255,.3); border-radius:2px; }

  .card {
    background: rgba(8,16,36,0.85);
    border: 1px solid rgba(0,245,255,.25);
    border-radius: 4px;
    padding: 36px 28px;
    max-width: 300px; width: 100%;
    box-shadow: 0 0 40px rgba(0,245,255,.1), inset 0 0 30px rgba(0,245,255,.04);
    backdrop-filter: blur(8px);
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute; top: -1px; left: 20%; right: 20%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,245,255,.6), transparent);
  }

  .icon {
    width: 52px; height: 52px; border-radius: 4px;
    border: 2px solid rgba(255,23,68,.5);
    background: rgba(255,23,68,.07);
    box-shadow: 0 0 16px rgba(255,23,68,.2), inset 0 0 10px rgba(255,23,68,.06);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
    font-size: 22px; line-height: 1;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px; font-weight: 900;
    letter-spacing: .2em; text-transform: uppercase;
    color: #ff4466;
    text-shadow: 0 0 12px rgba(255,68,102,.6);
    margin-bottom: 8px;
  }

  .sub {
    color: #3d6080; font-size: 11px; line-height: 1.6;
    margin-bottom: 22px; letter-spacing: .04em;
  }

  .cached {
    background: rgba(0,245,255,.05);
    border: 1px solid rgba(0,245,255,.2);
    border-radius: 3px; padding: 14px;
    margin-bottom: 20px; text-align: left;
    box-shadow: 0 0 10px rgba(0,245,255,.06);
  }
  .cached-label {
    font-size: 9px; font-weight: 600; color: #3d6080;
    text-transform: uppercase; letter-spacing: .14em; margin-bottom: 10px;
  }
  .cached-nums {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px; font-weight: 700; letter-spacing: .15em;
    color: #00f5ff;
    text-shadow: 0 0 10px rgba(0,245,255,.6);
  }
  .cached-draw {
    font-size: 10px; color: #3d6080; margin-top: 6px; letter-spacing: .06em;
  }

  button {
    background: rgba(0,245,255,.08);
    color: #00f5ff;
    border: 1px solid rgba(0,245,255,.4);
    padding: 10px 0; border-radius: 3px;
    cursor: pointer; font-size: 11px; font-weight: 700;
    width: 100%;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: .2em; text-transform: uppercase;
    text-shadow: 0 0 8px rgba(0,245,255,.5);
    box-shadow: 0 0 12px rgba(0,245,255,.12);
    transition: all .15s;
  }
  button:hover {
    background: rgba(0,245,255,.16);
    box-shadow: 0 0 20px rgba(0,245,255,.25);
    border-color: rgba(0,245,255,.7);
  }
  button:active { opacity: .75; }

  .signal-bar {
    display: flex; justify-content: center; gap: 4px;
    margin-bottom: 20px;
  }
  .signal-bar span {
    display: inline-block; width: 4px; border-radius: 1px;
    background: rgba(0,245,255,.2);
    animation: signal-pulse 1.4s ease-in-out infinite;
  }
  .signal-bar span:nth-child(1) { height: 8px;  animation-delay: 0s; }
  .signal-bar span:nth-child(2) { height: 14px; animation-delay: .15s; }
  .signal-bar span:nth-child(3) { height: 20px; animation-delay: .3s; }
  .signal-bar span:nth-child(4) { height: 14px; animation-delay: .45s; }
  .signal-bar span:nth-child(5) { height: 8px;  animation-delay: .6s; }
  @keyframes signal-pulse {
    0%, 100% { background: rgba(0,245,255,.15); }
    50%       { background: rgba(0,245,255,.7); box-shadow: 0 0 4px rgba(0,245,255,.5); }
  }
</style>
</head>
<body>
<div class="card">
  <div class="signal-bar">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="icon">📡</div>
  <h1>No Signal</h1>
  <p class="sub">Mất kết nối đến máy chủ.<br>Kiểm tra mạng và thử lại.</p>

  <div class="cached" id="cached-pred" style="display:none">
    <div class="cached-label">Dự đoán gần nhất · cached</div>
    <div class="cached-nums" id="cached-nums">—</div>
    <div class="cached-draw" id="cached-draw"></div>
  </div>

  <button onclick="location.reload()">Retry</button>
</div>

<script>
caches.open('bingo18-v1').then(c =>
  c.match('/api/next_prediction').then(r => {
    if (!r) return;
    r.json().then(d => {
      const nums = d.predicted_numbers || [];
      if (!nums.length) return;
      document.getElementById('cached-nums').textContent = nums.join('  ·  ');
      document.getElementById('cached-draw').textContent = 'KỲ #' + (d.draw_number || '');
      document.getElementById('cached-pred').style.display = 'block';
    });
  })
);
</script>
</body>
</html>
